releaseNotes: |
  v3.0.0 更新内容：
  - 实现同步范围配置支持按文章条数模式（默认100篇）
  - 添加全局同步状态用于菜单切换拦截功能
  - 重构同步逻辑支持按条数模式停止加载
  - 添加软删除和硬删除文章功能及对应UI操作
  - 优化配额管理支持阅读量和留言每日限制
  - 实现按公众号批量导出功能
  - 添加同步进度显示和状态管理
  - 优化文章统计字段及数据显示逻辑  
